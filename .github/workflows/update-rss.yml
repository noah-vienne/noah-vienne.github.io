name: Mise à jour flux RSS ransomwares

on:
  schedule:
    # Tous les jours à 7h00 UTC (9h00 heure française)
    - cron: "0 7 * * *"
  # Permet aussi de lancer manuellement depuis l'onglet Actions sur GitHub
  workflow_dispatch:

jobs:
  update-rss:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lancer le script de mise à jour RSS
        run: python update_rss.py

      - name: Pousser les modifications sur GitHub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto : mise à jour articles ransomwares [$(date '+%d/%m/%Y')]"
          git push
